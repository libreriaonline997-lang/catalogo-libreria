from pathlib import Path

html = """<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Librería Online</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4}
header{background:#fff;padding:20px;text-align:center;box-shadow:0 2px 6px #ccc;position:sticky;top:0}
header img{max-width:180px;border-radius:12px}
#buscar{width:min(500px,90%);padding:10px;border-radius:8px;border:1px solid #ccc}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;padding:20px}
.card{background:#fff;border-radius:10px;padding:15px;text-align:center;box-shadow:0 2px 6px #ddd}
.card img{width:100%;height:160px;object-fit:contain;background:#fafafa}
button{background:#222;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
.carrito{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:12px;box-shadow:0 -2px 6px #bbb}
</style>
</head>
<body>
<header>
<img src="logo.png" alt="Librería Online" style="max-width:180px;display:block;margin:0 auto 10px;">
<h1>Librería Online</h1>
<p>Todo lo que necesitás</p>
<input id="buscar" placeholder="Buscar producto..." onkeyup="filtrar()">
</header>

<div class="grid" id="productos"></div>

<div class="carrito">
<b id="total">Total: $0</b>
<button onclick="enviar()">Pedir por WhatsApp</button>
</div>

<script>
const productos=[
{name:"Trichetas",precio:1050,img:"https://via.placeholder.com/200?text=Producto"},
{name:"Resaltadores Skycolor Pastel",precio:1800,img:"https://via.placeholder.com/200?text=Producto"},
{name:"Compás Plástico",precio:2500,img:"https://via.placeholder.com/200?text=Producto"},
{name:"Tijera Punta Redonda",precio:1700,img:"https://via.placeholder.com/200?text=Producto"}
];
let total=0,pedido=[];
function render(lista){
const c=document.getElementById("productos");
c.innerHTML="";
lista.forEach(p=>{
c.innerHTML+=`<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.precio}</p>
<button onclick="agregar('${p.name}',${p.precio})">Agregar</button>
</div>`;
});
}
function agregar(n,p){pedido.push(n);total+=p;document.getElementById("total").textContent="Total: $"+total;}
function enviar(){
const txt=encodeURIComponent("Hola, quiero pedir:\\n"+pedido.join("\\n")+"\\nTotal: $"+total);
window.open("https://wa.me/5493408458354?text="+txt);
}
function filtrar(){
let t=document.getElementById("buscar").value.toLowerCase();
render(productos.filter(x=>x.name.toLowerCase().includes(t)));
}
render(productos);
</script>
</body>
</html>"""
path="/mnt/data/index.html"
Path(path).write_text(html,encoding="utf-8")
print(path)
