<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Librería Online</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:white;
text-align:center;
padding:20px;
box-shadow:0 2px 5px #ccc;
}

header h1{
margin:5px;
color:#222;
}

header p{
margin:0;
color:#555;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px #ddd;
}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

button{
background:#222;
color:white;
border:0;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.carrito{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
box-shadow:0 -2px 5px #ccc;
text-align:center;
}
</style>

</head>

<body>

<header>
<h1>✏️ Librería Online</h1>
<p>Todo lo que necesitás</p>
</header>

<div class="productos">

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Cuaderno A4</h3>
<p>$2500</p>
<button onclick="agregar(2500,'Cuaderno A4')">Agregar</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Lapicera Azul</h3>
<p>$500</p>
<button onclick="agregar(500,'Lapicera Azul')">Agregar</button>
</div>

</div>

<div class="carrito">
<h3>Carrito</h3>
<p id="total">Total: $0</p>
<button onclick="enviar()">Enviar pedido por WhatsApp</button>
</div>


<script>

let total=0;
let pedido=[];

function agregar(precio,nombre){
total+=precio;
pedido.push(nombre);
document.getElementById("total").innerHTML="Total: $"+total;
}

function enviar(){

let texto="Hola, quiero hacer este pedido:%0A"+pedido.join("%0A")+"%0ATotal: $"+total;

window.open("https://wa.me/TUNUMERO?text="+texto);

}

</script>

</body>
</html>
