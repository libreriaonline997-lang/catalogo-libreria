<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Librería Online</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:white;
padding:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
position:sticky;
top:0;
z-index:100;
}

header img{
width:170px;
margin-bottom:10px;
}

header h1{
font-size:32px;
color:#333;
}

header p{
color:#666;
margin-top:5px;
margin-bottom:15px;
}

#buscar{
width:90%;
max-width:450px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:25px;
}

.card{

background:white;
border-radius:12px;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
transition:.3s;

}

.card:hover{

transform:scale(1.03);

}

.card img{

width:100%;
height:180px;
object-fit:contain;

}

.card h3{

margin-top:10px;
font-size:20px;
color:#222;

}

.precio{

font-size:22px;
font-weight:bold;
color:#008000;
margin:12px 0;

}

button{

background:#0077ff;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#005fd1;

}

.carrito{

position:fixed;
bottom:0;
left:0;
right:0;
background:white;
box-shadow:0 -3px 10px rgba(0,0,0,.15);
padding:15px;

}
  .carrito h2{

margin-bottom:10px;
font-size:22px;

}

#listaCarrito{

max-height:180px;
overflow:auto;
margin-bottom:10px;

}

.item{

display:flex;
justify-content:space-between;
margin-bottom:8px;

}

.total{

font-size:22px;
font-weight:bold;
margin:10px 0;

}

.whatsapp{

background:#25D366;

}

.whatsapp:hover{

background:#1ebe5d;

}

footer{

text-align:center;
padding:120px 20px 30px;
color:#777;

}

</style>

</head>

<body>

<header>

<img src="logo.png" alt="Logo">

<h1>Librería Online</h1>

<p>Todo lo que necesitás</p>

<input
type="text"
id="buscar"
placeholder="Buscar producto..."
onkeyup="filtrar()">

</header>

<div class="productos" id="productos">

</div>

<div class="carrito">

<h2>🛒 Carrito</h2>

<div id="listaCarrito">

No hay productos.

</div>

<div class="total" id="total">

Total: $0

</div>

<button
class="whatsapp"
onclick="enviarPedido()">

Finalizar pedido por WhatsApp

</button>

</div>

<footer>

© Librería Online

</footer>

<script>
  const productos = [

{
nombre:"Trichetas",
precio:1050,
imagen:"https://via.placeholder.com/220?text=Trichetas"
},

{
nombre:"Resaltadores Skycolor Pastel",
precio:1800,
imagen:"https://via.placeholder.com/220?text=Resaltadores"
},

{
nombre:"Compás Plástico",
precio:2500,
imagen:"https://via.placeholder.com/220?text=Compás"
},

{
nombre:"Tijera Punta Redonda",
precio:1700,
imagen:"https://via.placeholder.com/220?text=Tijera"
}

];

let carrito=[];

mostrarProductos(productos);

function mostrarProductos(lista){

const contenedor=document.getElementById("productos");

contenedor.innerHTML="";

lista.forEach((p,i)=>{

contenedor.innerHTML+=`

<div class="card">

<img src="${p.imagen}">

<h3>${p.nombre}</h3>

<div class="precio">

$${p.precio}

</div>

<button onclick="agregar(${i})">

Agregar al carrito

</button>

</div>

`;

});

}

function filtrar(){

const texto=document
.getElementById("buscar")
.value
.toLowerCase();

const resultado=productos.filter(p=>

p.nombre.toLowerCase().includes(texto)

);

mostrarProductos(resultado);

}
  function agregar(indice){

carrito.push(productos[indice]);

actualizarCarrito();

}

function actualizarCarrito(){

const lista=document.getElementById("listaCarrito");

const total=document.getElementById("total");

lista.innerHTML="";

let suma=0;

if(carrito.length==0){

lista.innerHTML="No hay productos.";

total.innerHTML="Total: $0";

return;

}

carrito.forEach((p)=>{

suma+=p.precio;

lista.innerHTML+=`

<div class="item">

<span>${p.nombre}</span>

<strong>$${p.precio}</strong>

</div>

`;

});

total.innerHTML="Total: $"+suma;

}

function enviarPedido(){

if(carrito.length==0){

alert("El carrito está vacío");

return;

}

let mensaje="Hola, quiero realizar el siguiente pedido:%0A%0A";

let total=0;

carrito.forEach((p)=>{

mensaje+="• "+p.nombre+" - $"+p.precio+"%0A";

total+=p.precio;

});

mensaje+="%0ATotal: $"+total;

window.open("https://wa.me/5493408458354?text="+mensaje);

}
  actualizarCarrito();

</script>

</body>
</html>
